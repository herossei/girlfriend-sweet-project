<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="intro">
        <button id="introButt">Start</button>
    </div>

    <div id="Passlock">
        <img src="Images/Background img.png" alt="backgroundimg" id="bgImg">
        <p id="wadapass">What's the passcode?</p>

        <input type="text" id="inputBox" placeholder="Enter passcode">
        <button id="enterbutt">Enter</button>
    </div>

    <canvas id="Fireworks" class=""></canvas>

    <div id="Win"></div>

    <audio id="BgMusic" src="Audios/Coldplay_Sparks.mp3" type="audio/mpeg" loop>
        <source src="audio.mp3" type="audio/mpeg">
        <source src="audio.ogg" type="audio/ogg">
        <source src="audio.wav" type="audio/wav">
        Your browser does not support the audio element.
    </audio>

    <script src="script.js"></script>
    <script>
        const enterButt = document.getElementById("enterbutt");
        const inputBox = document.getElementById("inputBox");
        const passlockElement = document.getElementById("Passlock")
        const fireworksElement = document.getElementById("Fireworks")
        const Passcode = "0115";

        enterButt.addEventListener("click", () => {
            if (inputBox.value === Passcode) {
                passlockElement.classList.add("hide")
            }
        })

        // music / Start handling
        const introButt = document.getElementById("introButt");
        const bgMusic = document.getElementById("BgMusic");
        
        introButt.addEventListener("click", () => {
            bgMusic.play();
            introElement.classList.add("fade-out");
            introButt.classList.add("hide");
            introButt.disabled = true;
        })

        // Intro anim handling
        const introElement = document.getElementById("intro");

        introElement.addEventListener("animationend", () => {
            introElement.classList.add("hide");
        })
    </script>
</body>

</html>
